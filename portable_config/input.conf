##[MOUSE]
MBTN_LEFT           ignore                                                             # don't do anything
MBTN_RIGHT          ignore                                                             # don't do anything
MBTN_BACK           ignore                                                             # don't do anything
MBTN_FORWARD        ignore                                                             # don't do anything
WHEEL_UP            ignore                                                             # don't do anything
WHEEL_DOWN          ignore                                                             # don't do anything
WHEEL_LEFT          seek -10                                                           # seek 10 seconds backward
WHEEL_RIGHT         seek  10                                                           # seek 10 seconds forward
MBTN_LEFT_DBL       cycle fullscreen                                                   # toggle fullscreen
MBTN_MID            set video-align-x 0;set video-align-y 0;set video-zoom 0           # reset zoom and video alignment
Ctrl+MBTN_RIGHT     script-binding positioning/align-to-cursor                         # pan the whole video
Ctrl+MBTN_LEFT      script-binding positioning/drag-to-pan                             # pan around the clicked point
Ctrl+WHEEL_UP       script-binding positioning/cursor-centric-zoom  0.1                # zoom in towards the cursor
Ctrl+WHEEL_DOWN     script-binding positioning/cursor-centric-zoom -0.1                # zoom out towards the cursor


##[FUNCTION KEYS]
SPACE               cycle pause                                                        # toggle pause/playback mode
ESC                 cycle window-minimized                                             # toggle minimized
ENTER               cycle fullscreen                                                   # toggle fullscreen
KP_ENTER            cycle fullscreen                                                   # toggle fullscreen
TAB                 script-binding stats/display-page-1-toggle                         # toggle displaying information and statistics

HOME                no-osd set playlist-pos 0                                          # skip to the first file
END                 no-osd set playlist-pos-1 ${playlist-count}                        # skip to the last file
PGUP                playlist-prev                                                      # skip to the previous file
PGDWN               playlist-next                                                      # skip to the next file

PLAYPAUSE           cycle pause                                                        # toggle pause/playback mode
STOP                stop                                                               # stop playback
PREV                playlist-prev                                                      # skip to the previous file
NEXT                playlist-next                                                      # skip to the next file

Ctrl+NEXT           add playlist-pos +10                                               # skip to the 10 forward file
Ctrl+PREV           add playlist-pos -10                                               # skip to the 10 afterward file
Ctrl+PGDWN          add playlist-pos +10                                               # skip to the 10 forward file
Ctrl+PGUP           add playlist-pos -10                                               # skip to the 10 afterward file

PAUSE               cycle pause                                                        # toggle pause/playback mode
PAUSEONLY           set pause yes                                                      # pause
PLAYONLY            set pause no                                                       # unpause

CLOSE_WIN           quit                                                               # stop playback
POWER               quit                                                               # stop playback
FORWARD             seek 60                                                            # seek 1 minute forward
REWIND              seek -60                                                           # seek 1 minute backward
MUTE                cycle mute                                                         # toggle mute
VOLUME_UP           add volume +5
VOLUME_DOWN         add volume -5
ZOOMIN              add video-zoom  +0.1                                               # zoom in
ZOOMOUT             add video-zoom  -0.1                                               # zoom out

##[DIRECTION KEYS]
# Seek units are in seconds, but note that these are limited by keyframes
RIGHT               seek +5                                                            # seek 5 seconds forward
LEFT                seek -5                                                            # seek 5 seconds backward
UP                  seek +60                                                           # seek 60 seconds forward
DOWN                seek -60                                                           # seek 60 seconds backward
Ctrl+UP             seek +600                                                          # seek 10 minutes forward
Ctrl+DOWN           seek -600                                                          # seek 10 minutes backward
Ctrl+LEFT           add chapter -1                                                     # seek to the previous chapter
Ctrl+RIGHT          add chapter +1                                                     # seek to the next chapter


##[KEYPAD KEYS]
KP_END              add video-pan-x   -0.01; add video-pan-y    0.01                   # move video left and down
KP_DOWN             add video-pan-y    0.01                                            # move video down
KP_PGDWN            add video-pan-x    0.01; add video-pan-y    0.01                   # move video right and down
KP_LEFT             add video-pan-x   -0.01                                            # move video left
KP_BEGIN            set video-pan-x 0; set video-pan-y 0; set video-zoom 0             # reset zoom and pan settings
KP_RIGHT            add video-pan-x    0.01                                            # move video right
KP_HOME             add video-pan-x   -0.01; add video-pan-y   -0.01                   # move video left and up
KP_UP               add video-pan-y   -0.01                                            # move video up
KP_PGUP             add video-pan-x    0.01; add video-pan-y   -0.01                   # move video right and up

Ctrl+KP_END         add video-align-x -0.01; add video-align-y  0.01                   # align video left and down
Ctrl+KP_DOWN        add video-align-y  0.01                                            # align video down
Ctrl+KP_PGDWN       add video-align-x  0.01; add video-align-y  0.01                   # align video right and down
Ctrl+KP_LEFT        add video-align-x -0.01                                            # align video left
Ctrl+KP_BEGIN       set video-align-x  0.00; set video-align-y  0.00                   # reset video alignment
Ctrl+KP_RIGHT       add video-align-x  0.01                                            # align video right
Ctrl+KP_HOME        add video-align-x -0.01; add video-align-y -0.01                   # align video left and up
Ctrl+KP_UP          add video-align-y -0.01                                            # align video up
Ctrl+KP_PGUP        add video-align-x  0.01; add video-align-y -0.01                   # align video right and up

KP_DEC              cycle-values panscan 0 1                                           # switch proper or fill to window
KP_DEL              cycle-values panscan 0 1                                           # switch proper or fill to window
KP_MULTIPLY         add video-zoom  +0.1                                               # zoom in
KP_DIVIDE           add video-zoom  -0.1                                               # zoom out
KP_ADD              add image-display-duration +1
KP_SUBTRACT         add image-display-duration -1

KP5                 cycle-values image-display-duration 2 inf                          # cycle slideshow mode
KP4                 playlist-prev                                                      # skip to the previous file
KP6                 playlist-next                                                      # skip to the next file
KP2                 playlist-prev-playlist                                             # skip to the previous playlist
KP8                 playlist-next-playlist                                             # skip to the next playlist


##[KEYBOARD 1st-(`~BS)]

` script-binding commands/open                                                         # open the console

#Parameter_options
1 add contrast -1
2 add contrast +1
3 add brightness -1
4 add brightness +1
5 add gamma -1
6 add gamma +1
7 add saturation -1
8 add saturation +1
9 add hue -1
0 add hue +1
- add volume -5
= add volume +5
BS set contrast 0; set brightness 0; set gamma 0; set saturation 0; set hue 0          # reset parameter
DEL script-binding osc/visibility                                                      # cycle OSC visibility between never, auto (mouse-move) and always
Ctrl++ add audio-delay  0.100                                                          # change audio/video sync by delaying the audio
Ctrl+_ add audio-delay -0.100                                                          # change audio/video sync by shifting the audio earlier


##[KEYBOARD 2nd-(q~\)]
q             quit                                                                     # stop playback
r             cycle-values video-rotate 270 180 90 0                                   # The video output rotates 90° ACW
Ctrl+r        set file-local-options/start ${=time-pos}; playlist-play-index current yes; show-text "Reloading current file..." # reload the current file
t             show-text ${track-list} 5000                                             # show the list of video, audio and sub tracks
T             cycle ontop                                                              # toggle placing the video on top of other windows
y             seek 0 absolute                                                          # seek to the start
u             cycle sub-ass-override                                                   # toggle overriding SSA/ASS subtitle styles
U             cycle sub-ass-override down                                              # toggle overriding SSA/ASS subtitle styles backwards
Ctrl+u        cycle sub-ass-force-margins                                              # toggle SSA/ASS using black borders
Ctrl+U        cycle secondary-sub-ass-override                                         # toggle overriding SSA/ASS subtitle styles (secondary)
i             script-binding stats/display-stats-toggle                                # toggle displaying information and statistics
o             no-osd cycle-values osd-level 3 1                                        # toggle displaying the OSD on user interaction or always
p             show-text ${playlist} 5000                                               # show the playlist
[             multiply speed 0.9438743126816935                                        # decrease the playback speed
]             multiply speed 1.059463094352953                                         # increase the playback speed
{             multiply speed 0.5                                                       # halve the playback speed
}             multiply speed 2.0                                                       # double the playback speed
\             set speed  1.0                                                           # reset the speed to normal
#p            show-text "${?media-title:   [${playlist-pos-1}/${playlist-count}]\n${playlist}}"  5000


##[KEYBOARD 3rd-(a~')]
a             cycle audio                                                              # switch audio track
A             cycle audio down                                                         # switch audio track backwards
Ctrl+a        cycle-values video-aspect-override 16:10 16:9 4:3 no                     # cycle the video aspect ratio
s             screenshot video                                                         # original resolution without subtitles
s-d           screenshot                                                               # original resolution with subtitles
s-w           screenshot window                                                        # window with subtitles and OSD
s-a           screenshot video each-frame                                              # screenshot every frame, issue again to stop
d             cycle deband                                                             # toggle the debanding filter
D             cycle deinterlace                                                        # cycle the deinterlacing filter
f             cycle fullscreen                                                         # toggle fullscreen
Ctrl+h        cycle-values hwdec no auto                                               # toggle hardware decoding
h             cycle blend-subtitles                                                    # blend or not the subtitles
j             cycle sub                                                                # switch subtitle track
J             cycle sub down                                                           # switch subtitle track backwards
Ctrl+j        set clipboard/text ${sub-text:}                                          # copy the current subtitle text
k             cycle secondary-sid                                                      # switch secondary subtitle track
K             cycle secondary-sid down                                                 # switch secondary subtitle track backwards
Ctrl+k        set clipboard/text ${secondary-sub-text:}                                # copy the current subtitle text
l             ab-loop                                                                  # set/clear A-B loop points
L             cycle-values loop-file inf no                                            # toggle infinite looping
;             add sub-scale -0.1                                                       # decrease the subtitle font size
'             add sub-scale +0.1                                                       # increase the subtitle font size
:             add sub-delay -0.1                                                       # shift subtitles 100 ms earlier
"             add sub-delay +0.1                                                       # delay subtitles by 100 ms
Ctrl+;        add sub-pos -1                                                           # move subtitles up
Ctrl+'        add sub-pos +1                                                           # move subtitles down

##[KEYBOARD 4th-(z~/)]
z             cycle video                                                              # switch video track
Z             cycle video down                                                         # switch video track backwards
c             show-text ${chapter-list} 5000                                           # show the chapterlist
Ctrl+c        set clipboard/text ${path:}                                              # copy the current file path
v             cycle secondary-sub-visibility;cycle sub-visibility                      # hide or show the subtitles
Ctrl+v        update-clipboard text; loadfile ${clipboard/text} append-play; show-text '+ ${clipboard/text}'  # append the copied path
b             cycle border                                                             # hide or show the border
m             cycle mute                                                               # toggle mute
.             frame-step 1 seek                                                        # advance one frame and pause
,             frame-back-step                                                          # go back by one frame and pause
<             no-osd sub-seek -1                                                       # seek to the previous subtitle
>             no-osd sub-seek  1                                                       # seek to the next subtitle
?             script-binding stats/display-page-4-toggle                               # toggle displaying key bindings


F1            change-list glsl-shaders set "~~/shaders/flip_RT.glsl"
F2            change-list glsl-shaders set "~~/shaders/flip_VT.glsl"
F3            change-list glsl-shaders set "~~/shaders/flip_XT.glsl"
F4            no-osd change-list glsl-shaders clr ""; show-text "GLSL shaders cleared"
